name: Codex skill validation

on:
  push:
    paths:
      - "codex/project-guides/**"
      - ".github/workflows/codex-skill.yml"
  pull_request:
    paths:
      - "codex/project-guides/**"
      - ".github/workflows/codex-skill.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate skill package
        run: python codex/project-guides/scripts/validate_project_guides.py
      - name: Run validator fixtures
        run: python -m unittest discover -s codex/project-guides/tests -v

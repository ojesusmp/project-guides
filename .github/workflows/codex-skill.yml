name: Codex skill validation

on:
  push:
    paths:
      - "plugins/codex-guides/**"
      - ".agents/plugins/marketplace.json"
      - "integrations/codex-cloud/**"
      - "README.md"
      - ".github/workflows/codex-skill.yml"
  pull_request:
    paths:
      - "plugins/codex-guides/**"
      - ".agents/plugins/marketplace.json"
      - "integrations/codex-cloud/**"
      - "README.md"
      - ".github/workflows/codex-skill.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check Python syntax
        run: >-
          python -m compileall -q
          plugins/codex-guides/skills/codex-guides/scripts
          plugins/codex-guides/skills/codex-guides/tests
      - name: Validate skill package
        run: python plugins/codex-guides/skills/codex-guides/scripts/validate_codex_guides.py
      - name: Check cloud script syntax
        run: bash -n integrations/codex-cloud/setup.sh integrations/codex-cloud/maintenance.sh
      - name: Run regression suite
        run: >-
          python -m unittest discover
          -s plugins/codex-guides/skills/codex-guides/tests
          -v
